example_sagemaker_unified_studio_notebook:
  dag_id: example_sagemaker_unified_studio_notebook
  params: {}
  default_args: {}
  schedule: '@once'
  tasks:
    notebook-task:
      operator: airflow.providers.amazon.aws.operators.sagemaker_unified_studio_notebook.SageMakerUnifiedStudioNotebookOperator
      aws_conn_id: aws_datazone_notebook
      deferrable: false
      outlets: []
      priority_weight: 1
      retries: 0
      retry_delay:
        __type__: datetime.timedelta
        seconds: 300.0
      retry_exponential_backoff: false
      start_date:
        __type__: datetime.datetime
        year: 2021
        month: 1
        day: 1
      task_id: notebook-task
      trigger_rule: all_success
      wait_for_completion: true
